name: Pull Request to primary
run-name: ""
"on":
  pull_request:
    types:
      - labeled
      - opened
      - reopened
      - synchronize
      - unlabeled
    branches:
      - main
jobs:
  invoke-pipeline:
    name: Infrastream
    secrets: inherit
    uses: twinscan-care/default-managed-workflows-public/.github/workflows/north-sec-sandbox-svc-review-7-sandbox-svc-review-7-primary-branch-pull_request.yml@main
  merge-authorized:
    runs-on:
      - ubuntu-latest
    name: Merge Authorized
    steps:
      - id: merge-authorized
        name: Merge Authorized
        run: echo 'Authorized!'
    needs:
      - invoke-pipeline
permissions:
  actions: write
  checks: write
  contents: write
  id-token: write
  pull-requests: write
  security-events: write
